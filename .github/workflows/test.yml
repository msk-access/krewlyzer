name: Run Unit Tests

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true  # Required for data files in src/krewlyzer/data/
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install uv
        run: |
          sudo apt-get update && sudo apt-get install -y clang libclang-dev
          pip install uv
      - name: Create and activate uv venv
        run: |
          uv venv .venv
          source .venv/bin/activate
      - name: Install dependencies with uv
        run: |
          source .venv/bin/activate
          uv pip install .[test]
      - name: Run unit tests
        run: |
          source .venv/bin/activate
          uv pip list
          python -m pytest --maxfail=3 --disable-warnings -q
      - name: Build Python Package (Dry Run)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --sdist --manifest-path rust/Cargo.toml -i python3.10
          manylinux: manylinux_2_28
          before-script-linux: |
            # Use system OpenSSL instead of building from source
            export OPENSSL_NO_VENDOR=1

            SUDO=""
            if [ "$(id -u)" -ne 0 ] && command -v sudo &> /dev/null; then
              SUDO="sudo"
            fi

            if command -v yum &> /dev/null; then
              $SUDO yum install -y zlib-devel bzip2-devel xz-devel libcurl-devel openssl-devel clang llvm-devel
            elif command -v apt-get &> /dev/null; then
              $SUDO apt-get update && $SUDO apt-get install -y zlib1g-dev libbz2-dev liblzma-dev libcurl4-openssl-dev libssl-dev clang libclang-dev
            elif command -v apk &> /dev/null; then
              $SUDO apk add zlib-dev bzip2-dev xz-dev curl-dev openssl-dev clang clang-dev
            else
              echo "Unsupported package manager"
              exit 1
            fi
      - name: Verify Wheel
        run: |
          source .venv/bin/activate
          pip install dist/*.whl
          python -c "import krewlyzer; print('Imported:', krewlyzer); print('File:', krewlyzer.__file__)"
          krewlyzer --help
      - name: Build Docker Image (Dry Run)
        run: |
          docker build .

  lint:
    name: Lint (ruff · black · mypy · clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies
        run: |
          # Build the Rust extension first — mypy needs to import krewlyzer._core
          uv pip install --system maturin
          maturin build --release --manifest-path rust/Cargo.toml --out dist
          uv pip install --system dist/*.whl
          # Install lint tools from dev extras
          uv pip install --system ".[dev]"

      - name: Run black
        run: |
          black --check src/krewlyzer/ tests/

      - name: Run ruff
        run: |
          ruff check src/krewlyzer/ tests/

      - name: Run mypy
        run: |
          mypy src/krewlyzer/ --ignore-missing-imports --no-error-summary

      - name: Run cargo clippy
        run: |
          cargo clippy --manifest-path rust/Cargo.toml -- \
            -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity
